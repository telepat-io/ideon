name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  quality-gates:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/quality-gates.yml
    with:
      node-version: '20'
      upload-coverage: false
    secrets: inherit

  publish:
    needs:
      - release-please
      - quality-gates
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Print publish context
        run: |
          echo "repository=$GITHUB_REPOSITORY"
          echo "ref=$GITHUB_REF"
          echo "sha=$GITHUB_SHA"
          echo "workflow=$GITHUB_WORKFLOW"
          echo "workflow_ref=$GITHUB_WORKFLOW_REF"
          echo "run_id=$GITHUB_RUN_ID"

      - name: Inspect OIDC claims for npm trusted publishing
        run: |
          set -euo pipefail

          OIDC_RESPONSE="$(curl -sSfL \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"

          OIDC_TOKEN="$(node -e 'const fs=require("fs");const d=JSON.parse(fs.readFileSync(0,"utf8"));process.stdout.write(d.value||"");' <<<"$OIDC_RESPONSE")"

          if [ -z "$OIDC_TOKEN" ]; then
            echo "Failed to obtain OIDC token for npm audience"
            exit 1
          fi

          OIDC_PAYLOAD="$(node -e 'const t=process.argv[1];const p=t.split(".")[1]||"";const s=p.replace(/-/g,"+").replace(/_/g,"/");const pad=s+"===".slice((s.length+3)%4);process.stdout.write(Buffer.from(pad,"base64").toString("utf8"));' "$OIDC_TOKEN")"

          node -e 'const fs=require("fs");const j=JSON.parse(fs.readFileSync(0,"utf8"));const keys=["iss","sub","aud","repository","repository_owner","ref","sha","workflow","workflow_ref","job_workflow_ref","event_name","actor","environment","runner_environment"];const out={};for(const k of keys){if(j[k]!==undefined)out[k]=j[k];}console.log(JSON.stringify(out,null,2));' <<<"$OIDC_PAYLOAD"

          EXCHANGE_RESPONSE_FILE="$(mktemp)"
          EXCHANGE_STATUS="$(curl -sS -o "$EXCHANGE_RESPONSE_FILE" -w '%{http_code}' \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/%40telepat%2Fideon")"

          echo "npm_oidc_exchange_status=$EXCHANGE_STATUS"
          node -e 'const fs=require("fs");let body={raw:fs.readFileSync(process.argv[1],"utf8")};try{body=JSON.parse(body.raw);}catch{}if(body.token){body.token="<redacted>";}console.log(JSON.stringify(body,null,2));' "$EXCHANGE_RESPONSE_FILE"

          if [ "$EXCHANGE_STATUS" -lt 200 ] || [ "$EXCHANGE_STATUS" -gt 299 ]; then
            echo "npm OIDC package exchange failed before publish"
            exit 1
          fi

      - name: Publish package to npm
        id: npm_publish
        continue-on-error: true
        run: npm publish --provenance --access public

      - name: Dump npm debug logs on failure
        if: steps.npm_publish.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "npm publish failed; dumping debug logs"
          ls -la /home/runner/.npm/_logs || true
          for f in /home/runner/.npm/_logs/*-debug-0.log; do
            if [ -f "$f" ]; then
              echo "::group::$f"
              sed -n '1,220p' "$f"
              echo "::endgroup::"
            fi
          done
          exit 1
