name: Quality Gates

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use for validation
        required: false
        type: string
        default: '20'
      upload-coverage:
        description: Upload coverage artifact to Codecov when token is provided
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs-site

      - name: Validate repository quality gates
        run: |
          npm run lint
          npm run test:coverage
          npm run build
          npm run docs:build

      - name: Upload coverage to Codecov
        if: inputs.upload-coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          disable_search: true
          verbose: true
